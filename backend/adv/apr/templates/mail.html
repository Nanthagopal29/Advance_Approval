<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body style="margin:0;padding:40px 10px;background-color:#f8fafc;font-family:'Inter', Arial, sans-serif;">

  <div style="max-width:400px;margin:auto;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);">

    <div style="height:6px;background:linear-gradient(90deg, #4f46e5, #7c3aed);"></div>

    <div style="padding:32px 24px;">
            <h1 style="
        margin:0 0 16px 0;
        padding:0 16px;
        text-align:center;
        color:#1e293b;
        font-size:24px;
        font-weight:700;
        letter-spacing:-0.02em;
      ">
        💰 Advance Request
      </h1>
      
      <div style="text-align:center;margin-bottom:24px;">
        <div style="position:relative;display:inline-block;">
          {% if photo_cid %}
            <img src="cid:{{ photo_cid }}" style="width:80px;height:80px;border-radius:24px;border:3px solid #f1f5f9;">
          {% else %}
            <img src="https://ui-avatars.com/api/?name={{ name }}&background=4f46e5&color=fff&size=128" style="width:80px;height:80px;border-radius:24px;border:3px solid #f1f5f9;">
          {% endif %}
        
        </div>
        
        <h2 style="margin:16px 0 4px 0;color:#1e293b;font-size:20px;font-weight:700;letter-spacing:-0.02em;">{{ name }}</h2>
        <p style="margin:0;color:#64748b;font-size:14px;font-weight:500;">ID : {{ empid }}</p>
        <p style="margin:0;color:#64748b;font-size:14px;font-weight:500;">Department: {{ dept }}</p>
      </div>

      <div style="background:#f1f5f9;border-radius:12px;padding:20px;margin-bottom:24px;">
        <div style="text-align:center;">
          <span style="text-transform:uppercase;font-size:11px;font-weight:700;color:#64748b;letter-spacing:0.05em;">Requested Amount</span>
          <h1 style="margin:8px 0;color:#0f172a;font-size:32px;font-weight:800;">₹{{ amt }}</h1>
        </div>
        
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid #e2e8f0;">
          <p style="margin:0;font-size:12px;color:#64748b;margin-bottom:4px;font-weight:600;">REMARKS</p>
          <p style="margin:0;font-size:12px;color:#334155;">
            {{ remarks|cut:'"' }}
          </p>
        </div>
      </div>

      <div style="display:grid;gap:12px;">
        <a href="{{ approve_url }}" 
           style="display:block;background:#4f46e5;color:#ffffff;padding:14px;border-radius:10px;text-align:center;text-decoration:none;font-weight:600;font-size:15px;box-shadow:0 4px 6px -1px rgba(79, 70, 229, 0.2);">
           Approve Request
        </a>
        
        <a href="{{ reject_url }}" 
          style="display:block;background:transparent;color:#64748b;padding:10px;border-radius:10px;text-align:center;text-decoration:none;font-weight:600;font-size:14px;border:1px solid #e2e8f0; margin-top: 10px;">
          Reject Request
        </a>
      </div>

    </div>

    <div style="background:#f8fafc;padding:16px;text-align:center;border-top:1px solid #f1f5f9;">
      <p style="margin:0;font-size:11px;color:#94a3b8;letter-spacing:0.02em;">
        Generated by <b>Hero Fashion HR</b> System
      </p>
    </div>

  </div>
</body>
</html>`
